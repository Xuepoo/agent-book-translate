repos:
  - repo: local
    hooks:
      - id: rustfmt
        name: rustfmt
        entry: cargo fmt --all -- --check
        language: system
        files: \.rs$
        pass_filenames: false

      - id: clippy
        name: clippy
        entry: cargo clippy --all-targets -- -D warnings
        language: system
        files: \.rs$
        pass_filenames: false

      - id: cargo-test
        name: cargo-test
        entry: cargo test --verbose
        language: system
        files: \.rs$
        pass_filenames: false

      - id: toml-lint
        name: TOML lint
        entry: taplo lint
        language: system
        files: \.toml$
        pass_filenames: true
