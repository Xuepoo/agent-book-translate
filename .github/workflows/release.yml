name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            artifact_name: agent-book-translate-linux-x86_64
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-24.04-arm
            artifact_name: agent-book-translate-linux-aarch64
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            artifact_name: agent-book-translate-windows-x86_64.exe
          - target: x86_64-apple-darwin
            os: macos-latest
            artifact_name: agent-book-translate-macos-x86_64
          - target: aarch64-apple-darwin
            os: macos-latest
            artifact_name: agent-book-translate-macos-aarch64

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.85.0"
          targets: ${{ matrix.target }}

      - name: Cache Rust artifacts
        uses: swatinem/rust-cache@v2

      - name: Build release binary
        shell: bash
        run: |
          cargo build --release --locked --target "${{ matrix.target }}"
          mkdir -p dist
          binary="target/${{ matrix.target }}/release/agent-book-translate"
          if [[ "${{ matrix.target }}" == *windows* ]]; then
            binary="${binary}.exe"
          fi
          cp "${binary}" "dist/${{ matrix.artifact_name }}"
          
          # Also copy for nfpm packaging if on Linux
          if [ "${{ runner.os }}" = "Linux" ]; then
            cp "${binary}" "./agent-book-translate"
            chmod +x ./agent-book-translate
          fi

      - name: Package for Linux distributions
        if: runner.os == 'Linux'
        shell: bash
        run: |
          # Determine CPU Architecture
          ARCH_TYPE=$(uname -m)
          if [ "$ARCH_TYPE" = "aarch64" ]; then
            NFPM_ARCH="arm64"
            ARCH="arm64"
            PKG_ARCH="aarch64"
          else
            NFPM_ARCH="x86_64"
            ARCH="amd64"
            PKG_ARCH="x86_64"
          fi
          
          # Download nFPM
          curl -sL https://github.com/goreleaser/nfpm/releases/download/v2.37.1/nfpm_2.37.1_Linux_${NFPM_ARCH}.tar.gz | tar xz nfpm
          
          # Extract Version from Tag
          VERSION=${GITHUB_REF#refs/tags/v}
          if [[ "$VERSION" == refs/heads/* ]] || [[ "$VERSION" == refs/pull/* ]] || [ -z "$VERSION" ]; then
            VERSION="0.1.0"
          fi
          
          export VERSION
          export ARCH
          
          # Generate Debian and RPM packages
          ./nfpm pkg --packager deb --target dist/agent-book-translate-linux-${PKG_ARCH}.deb
          ./nfpm pkg --packager rpm --target dist/agent-book-translate-linux-${PKG_ARCH}.rpm

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: dist/*

  publish:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Generate release notes
        shell: bash
        run: |
          cat > release-notes.txt <<EOF
          agent-book-translate ${GITHUB_REF_NAME}

          Built artifacts:
          - linux x86_64
          - linux aarch64
          - windows x86_64
          - macOS x86_64
          - macOS aarch64
          EOF

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/**/*
            release-notes.txt
