name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            artifact_name: agent-book-translate-linux-x86_64
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-24.04-arm
            artifact_name: agent-book-translate-linux-aarch64
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            artifact_name: agent-book-translate-windows-x86_64.exe
          - target: x86_64-apple-darwin
            os: macos-latest
            artifact_name: agent-book-translate-macos-x86_64
          - target: aarch64-apple-darwin
            os: macos-latest
            artifact_name: agent-book-translate-macos-aarch64

    steps:
      - uses: actions/checkout@v7

      - name: Install Rust toolchain
        shell: bash
        run: |
          rustup toolchain install 1.85.0 --profile minimal
          rustup default 1.85.0
          rustup target add ${{ matrix.target }}

      - name: Cache Rust artifacts
        uses: swatinem/rust-cache@v2

      - name: Build release binary
        shell: bash
        run: |
          cargo build --release --locked --target "${{ matrix.target }}"
          mkdir -p dist
          binary="target/${{ matrix.target }}/release/agent-book-translate"
          if [[ "${{ matrix.target }}" == *windows* ]]; then
            binary="${binary}.exe"
          fi
          cp "${binary}" "dist/${{ matrix.artifact_name }}"
          
          # Also copy for nfpm packaging if on Linux
          if [ "${{ runner.os }}" = "Linux" ]; then
            cp "${binary}" "./agent-book-translate"
            chmod +x ./agent-book-translate
          fi

      - name: Package for Linux distributions
        if: runner.os == 'Linux'
        shell: bash
        run: |
          # Determine CPU Architecture
          ARCH_TYPE=$(uname -m)
          if [ "$ARCH_TYPE" = "aarch64" ]; then
            NFPM_ARCH="arm64"
            ARCH="arm64"
            PKG_ARCH="aarch64"
          else
            NFPM_ARCH="x86_64"
            ARCH="amd64"
            PKG_ARCH="x86_64"
          fi
          
          # Download nFPM
          curl -sL https://github.com/goreleaser/nfpm/releases/download/v2.37.1/nfpm_2.37.1_Linux_${NFPM_ARCH}.tar.gz | tar xz nfpm
          
          # Extract Version from Tag
          VERSION=${GITHUB_REF#refs/tags/v}
          if [[ "$VERSION" == refs/heads/* ]] || [[ "$VERSION" == refs/pull/* ]] || [ -z "$VERSION" ]; then
            VERSION="0.1.0"
          fi
          
          export VERSION
          export ARCH
          
          # Generate Debian and RPM packages
          ./nfpm pkg --packager deb --target dist/agent-book-translate-linux-${PKG_ARCH}.deb
          ./nfpm pkg --packager rpm --target dist/agent-book-translate-linux-${PKG_ARCH}.rpm

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact_name }}
          path: dist/*

  publish:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/download-artifact@v8
        with:
          path: dist

      - name: Generate release notes
        shell: bash
        run: |
          cat > release-notes.txt <<EOF
          agent-book-translate ${GITHUB_REF_NAME}

          Built artifacts:
          - linux x86_64
          - linux aarch64
          - windows x86_64
          - macOS x86_64
          - macOS aarch64
          EOF

      - name: Create GitHub release
        uses: softprops/action-gh-release@v3
        with:
          files: |
            dist/**/*
            release-notes.txt

  publish-crates:
    name: Publish to crates.io
    needs: publish
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Install Rust toolchain
        shell: bash
        run: |
          rustup toolchain install 1.85.0 --profile minimal
          rustup default 1.85.0

      - name: Publish to crates.io
        run: |
          cargo publish --token ${{ secrets.CRATES_TOKEN }} 2>&1 | tee publish.log || {
            if grep -q "already exists" publish.log; then
              echo "Crate version already exists on crates.io, skipping..."
            else
              exit 1
            fi
          }
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_TOKEN }}

  publish-aur:
    name: Publish to AUR
    needs: publish
    runs-on: ubuntu-latest
    container: archlinux:latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Install Arch build dependencies
        run: |
          pacman -Syu --noconfirm git openssh pacman-contrib sudo fakeroot binutils make gcc pkgconf

      - name: Configure SSH Key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.AUR_SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -t ed25519 aur.archlinux.org >> ~/.ssh/known_hosts

          # Sync to /root/.ssh for standard ssh client compatibility in containers
          mkdir -p /root/.ssh
          cp -r ~/.ssh/* /root/.ssh/
          chmod 700 /root/.ssh
          chmod 600 /root/.ssh/*

      - name: Configure Git
        run: |
          git config --system --add safe.directory '*'
          git config --global user.name "Xuepoo (CI)"
          git config --global user.email "xuepoofoter@gmail.com"

      - name: Update AUR source package (agent-book-translate)
        run: |
          git clone ssh://aur@aur.archlinux.org/agent-book-translate.git aur-src
          cd aur-src
          
          # Cold-start: Generate standard PKGBUILD template if it is an empty repository
          if [ ! -f PKGBUILD ]; then
            printf '%s\n' \
              '# Maintainer: Xuepoo Foter <foter@example.com>' \
              'pkgname=agent-book-translate' \
              'pkgver=0.1.0' \
              'pkgrel=1' \
              'pkgdesc="A powerful LLM-driven agentic EPUB book translator with robust progress monitoring and recovery"' \
              'arch=("x86_64" "aarch64")' \
              'url="https://github.com/Xuepoo/agent-book-translate"' \
              'license=("MIT")' \
              'depends=("sqlite" "openssl")' \
              'makedepends=("cargo")' \
              'source=("${pkgname}-${pkgver}.tar.gz::https://github.com/Xuepoo/agent-book-translate/archive/v${pkgver}.tar.gz")' \
              'sha256sums=("SKIP")' \
              '' \
              'prepare() {' \
              '  cd "${pkgname}-${pkgver}"' \
              '  cargo fetch --locked --target "$(rustc -vV | sed -n '\''s/host: //p'\'')"' \
              '}' \
              '' \
              'build() {' \
              '  cd "${pkgname}-${pkgver}"' \
              '  CARGO_PROFILE_RELEASE_LTO=true cargo build --release --frozen' \
              '}' \
              '' \
              'check() {' \
              '  cd "${pkgname}-${pkgver}"' \
              '  cargo test --frozen --lib' \
              '}' \
              '' \
              'package() {' \
              '  cd "${pkgname}-${pkgver}"' \
              '  install -Dm755 "target/release/${pkgname}" "${pkgdir}/usr/bin/${pkgname}"' \
              '  install -Dm644 "LICENSE" "${pkgdir}/usr/share/licenses/${pkgname}/LICENSE"' \
              '}' > PKGBUILD
          fi

          CLEAN_VERSION=${{ github.ref_name }}
          CLEAN_VERSION=${CLEAN_VERSION#v}
          sed -i "s/^pkgver=.*/pkgver=${CLEAN_VERSION}/" PKGBUILD
          sed -i "s/^pkgrel=.*/pkgrel=1/" PKGBUILD
          useradd -m builder && echo "builder ALL=(ALL) NOPASSWD: ALL" >> /etc/sudoers
          chown -R builder:builder .
          su builder -c "updpkgsums && makepkg --printsrcinfo > .SRCINFO"
          git add PKGBUILD .SRCINFO
          git commit -m "Update to v${CLEAN_VERSION}" || true
          git push origin master

      - name: Update AUR binary package (agent-book-translate-bin)
        run: |
          git clone ssh://aur@aur.archlinux.org/agent-book-translate-bin.git aur-bin
          cd aur-bin
          
          # Cold-start: Generate standard PKGBUILD template if it is an empty repository
          if [ ! -f PKGBUILD ]; then
            printf '%s\n' \
              '# Maintainer: Xuepoo Foter <foter@example.com>' \
              'pkgname=agent-book-translate-bin' \
              'pkgver=0.1.0' \
              'pkgrel=1' \
              'pkgdesc="A powerful LLM-driven agentic EPUB book translator (binary release)"' \
              'arch=("x86_64" "aarch64")' \
              'url="https://github.com/Xuepoo/agent-book-translate"' \
              'license=("MIT")' \
              'depends=("sqlite" "openssl")' \
              'provides=("agent-book-translate")' \
              'conflicts=("agent-book-translate")' \
              '' \
              'source_x86_64=("${pkgname}-x86_64-${pkgver}::https://github.com/Xuepoo/agent-book-translate/releases/download/v${pkgver}/agent-book-translate-linux-x86_64")' \
              'source_aarch64=("${pkgname}-aarch64-${pkgver}::https://github.com/Xuepoo/agent-book-translate/releases/download/v${pkgver}/agent-book-translate-linux-aarch64")' \
              '' \
              'sha256sums_x86_64=("SKIP")' \
              'sha256sums_aarch64=("SKIP")' \
              '' \
              'package() {' \
              '  if [ "${CARCH}" = "x86_64" ]; then' \
              '    install -Dm755 "${srcdir}/${pkgname}-x86_64-${pkgver}" "${pkgdir}/usr/bin/agent-book-translate"' \
              '  elif [ "${CARCH}" = "aarch64" ]; then' \
              '    install -Dm755 "${srcdir}/${pkgname}-aarch64-${pkgver}" "${pkgdir}/usr/bin/agent-book-translate"' \
              '  fi' \
              '}' > PKGBUILD
          fi

          CLEAN_VERSION=${{ github.ref_name }}
          CLEAN_VERSION=${CLEAN_VERSION#v}
          sed -i "s/^pkgver=.*/pkgver=${CLEAN_VERSION}/" PKGBUILD
          sed -i "s/^pkgrel=.*/pkgrel=1/" PKGBUILD
          useradd -m builder && echo "builder ALL=(ALL) NOPASSWD: ALL" >> /etc/sudoers
          chown -R builder:builder .
          su builder -c "updpkgsums && makepkg --printsrcinfo > .SRCINFO"
          git add PKGBUILD .SRCINFO
          git commit -m "Update to v${CLEAN_VERSION}" || true
          git push origin master

  publish-homebrew:
    name: Publish to Homebrew Tap
    needs: publish
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: Calculate SHA256
        id: sha
        run: |
          VERSION="${{ github.ref_name }}"
          CLEAN_VERSION=${VERSION#v}
          echo "version=${CLEAN_VERSION}" >> "$GITHUB_OUTPUT"

          sleep 15

          SHA_LINUX=$(sha256sum artifacts/agent-book-translate-linux-x86_64/agent-book-translate-linux-x86_64 | awk '{print $1}')
          SHA_MACOS_X86=$(sha256sum artifacts/agent-book-translate-macos-x86_64/agent-book-translate-macos-x86_64 | awk '{print $1}')
          SHA_MACOS_ARM=$(sha256sum artifacts/agent-book-translate-macos-aarch64/agent-book-translate-macos-aarch64 | awk '{print $1}')

          echo "sha_linux=${SHA_LINUX}" >> "$GITHUB_OUTPUT"
          echo "sha_macos_x86=${SHA_MACOS_X86}" >> "$GITHUB_OUTPUT"
          echo "sha_macos_arm=${SHA_MACOS_ARM}" >> "$GITHUB_OUTPUT"

      - name: Update Formula
        run: |
          VERSION="${{ steps.sha.outputs.version }}"
          REPO_URL="https://x-access-token:${{ secrets.GH_PAT }}@github.com/Xuepoo/homebrew-tap.git"

          git clone "${REPO_URL}" tap
          cd tap
          mkdir -p Formula

          cat > Formula/agent-book-translate.rb << 'FORMULA'
          class AgentBookTranslate < Formula
            desc "A powerful LLM-driven agentic EPUB book translator with robust progress monitoring and recovery"
            homepage "https://github.com/Xuepoo/agent-book-translate"
            version "VERSION_PLACEHOLDER"
            license "MIT"

            on_macos do
              if Hardware::CPU.arm?
                url "https://github.com/Xuepoo/agent-book-translate/releases/download/vVERSION_PLACEHOLDER/agent-book-translate-macos-aarch64"
                sha256 "SHA_MACOS_ARM_PLACEHOLDER"
              else
                url "https://github.com/Xuepoo/agent-book-translate/releases/download/vVERSION_PLACEHOLDER/agent-book-translate-macos-x86_64"
                sha256 "SHA_MACOS_X86_PLACEHOLDER"
              end
            end

            on_linux do
              url "https://github.com/Xuepoo/agent-book-translate/releases/download/vVERSION_PLACEHOLDER/agent-book-translate-linux-x86_64"
              sha256 "SHA_LINUX_PLACEHOLDER"
            end

            def install
              if OS.mac?
                if Hardware::CPU.arm?
                  bin.install "agent-book-translate-macos-aarch64" => "agent-book-translate"
                else
                  bin.install "agent-book-translate-macos-x86_64" => "agent-book-translate"
                end
              elsif OS.linux?
                bin.install "agent-book-translate-linux-x86_64" => "agent-book-translate"
              end
            end

            test do
              assert_match version.to_s, shell_output("#{bin}/agent-book-translate --version")
            end
          end
          FORMULA

          sed -i "s/VERSION_PLACEHOLDER/${VERSION}/g" Formula/agent-book-translate.rb
          sed -i "s/SHA_MACOS_ARM_PLACEHOLDER/${{ steps.sha.outputs.sha_macos_arm }}/g" Formula/agent-book-translate.rb
          sed -i "s/SHA_MACOS_X86_PLACEHOLDER/${{ steps.sha.outputs.sha_macos_x86 }}/g" Formula/agent-book-translate.rb
          sed -i "s/SHA_LINUX_PLACEHOLDER/${{ steps.sha.outputs.sha_linux }}/g" Formula/agent-book-translate.rb

          git config user.name "Xuepoo (CI)"
          git config user.email "xuepoofoter@gmail.com"
          git add Formula/agent-book-translate.rb
          git commit -m "chore: update agent-book-translate to v${VERSION}" || true
          git push "${REPO_URL}" HEAD:main

  publish-scoop:
    name: Publish to Scoop Bucket
    needs: publish
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: Calculate SHA256 and Update
        run: |
          VERSION="${{ github.ref_name }}"
          CLEAN_VERSION=${VERSION#v}
          SHA_WIN=$(sha256sum artifacts/agent-book-translate-windows-x86_64.exe/agent-book-translate-windows-x86_64.exe | awk '{print $1}')

          REPO_URL="https://x-access-token:${{ secrets.GH_PAT }}@github.com/Xuepoo/scoop-bucket.git"
          git clone "${REPO_URL}" bucket
          cd bucket
          mkdir -p bucket

          cat > bucket/agent-book-translate.json << EOF
          {
            "version": "${CLEAN_VERSION}",
            "description": "A powerful LLM-driven agentic EPUB book translator with robust progress monitoring and recovery",
            "homepage": "https://github.com/Xuepoo/agent-book-translate",
            "license": "MIT",
            "architecture": {
              "64bit": {
                "url": "https://github.com/Xuepoo/agent-book-translate/releases/download/v${CLEAN_VERSION}/agent-book-translate-windows-x86_64.exe",
                "hash": "${SHA_WIN}",
                "bin": [["agent-book-translate-windows-x86_64.exe", "agent-book-translate"]]
              }
            },
            "checkver": {
              "github": "https://github.com/Xuepoo/agent-book-translate"
            },
            "autoupdate": {
              "architecture": {
                "64bit": {
                  "url": "https://github.com/Xuepoo/agent-book-translate/releases/download/v\$version/agent-book-translate-windows-x86_64.exe"
                }
              }
            }
          }
          EOF

          git config user.name "Xuepoo (CI)"
          git config user.email "xuepoofoter@gmail.com"
          git add bucket/agent-book-translate.json
          git commit -m "chore: update agent-book-translate to v${CLEAN_VERSION}" || true
          git push "${REPO_URL}" HEAD:main
